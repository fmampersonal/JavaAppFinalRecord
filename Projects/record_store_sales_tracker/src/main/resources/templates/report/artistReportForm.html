<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/head :: head">
    <title>Artist Report</title>
</head>
<body>
<style scoped>
    input:not(.hidden) { display: inline-block; float: right; }
    label { margin-right: 8px; }
</style>

<nav th:replace="fragments/navHeader :: navbar"></nav>

<div class="container has-text-centered">
    <h2 class="title is-2">Albums Sold by Artist</h2>

    <form th:action="@{/report/artist/submit}" th:object="${reportInput}" method="post" class="wbb"
          style="display:inline-block;text-align:left!important">
        <label>Artist Name:</label>
        <input type="text" th:field="*{artistName}" placeholder="Enter artist name"/>
        <br/>
        <button style="display:block;margin-top:24px!important">Generate Report</button>
    </form>

    <p th:if="${message}" th:text="${message}"></p>
</div>

<footer th:replace="fragments/footer :: footer"></footer>
</body>
</html>
