<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/head :: head">
    <title>Record Sale Transactions</title>
</head>
<body>
<nav th:replace="fragments/navHeader :: navbar"></nav>

<div class="container has-text-centered">
    <h2 class="title is-2">Record Sale Transactions</h2>

    <a th:href="@{/recordsale/add}" class="button is-primary">Add New Sale</a>
    <form th:action="@{/recordsale/search}" method="get" style="margin-bottom: 20px;">
        <input type="text" name="artistName" placeholder="Search by Artist Name" />
        <input type="text" name="dateOfSale" placeholder="Search by Date (yyyy-MM-dd)" />
        <input type="text" name="customerName" placeholder="Search by Customer Name" />

        <button type="submit">Search</button>
    </form>


    <table class="table is-striped is-hoverable" style="margin: 0 auto;">
        <thead>
        <tr>
            <th>ID</th>
            <th>Date of Sale</th>
            <th>Artist Name</th>
            <th>Customer Name</th>
            <th>Album Name</th>
            <th>Format Type</th>
            <th>Album Price</th>
            <th>Gift Wrapped</th>
            <th>Units Sold</th>
            <th>Subtotal</th>
            <th>Total Cost</th>
            <th>Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="sale : ${sales}">
            <td th:text="${sale.id}"></td>
            <td th:text="${sale.dateOfSale}"></td>
            <td th:text="${sale.artistName}"></td>
            <td th:text="${sale.customerName}"></td>
            <td th:text="${sale.albumName}"></td>
            <td th:text="${sale.formatType}"></td>
            <td th:text="${sale.albumPrice}"></td>
            <td th:text="${sale.giftWrapped}"></td>
            <td th:text="${sale.unitsSold}"></td>
            <td th:text="${sale.subtotal}"></td>
            <td th:text="${sale.totalCost}"></td>
            <td>
                <a th:href="@{'/recordsale/view/' + ${sale.id}}" class="button is-small">View</a>
                <a th:href="@{'/recordsale/edit/' + ${sale.id}}" class="button is-small is-info">Edit</a>
                <a th:href="@{'/recordsale/delete/' + ${sale.id}}" class="button is-small is-danger"
                   onclick="return confirm('Are you sure you want to delete this sale?');">Delete</a>
            </td>
        </tr>
        </tbody>
    </table>
</div>

<footer th:replace="fragments/footer :: footer"></footer>
</body>
</html>
